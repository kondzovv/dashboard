; MOJE TO-DO — Personal Dashboard (widget na pulpit)
; USTAW StatsFile ponizej na plik dashboard-widget.txt z folderu wybranego w apce.
; Najprosciej: utworz C:\DashboardWidget i wybierz go w apce -> dziala bez zmian.

[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Variables]
StatsFile=C:\DashboardWidget\dashboard-widget.txt
FontName=Segoe UI

[MeasureStats]
Measure=WebParser
URL=file://#StatsFile#
CodePage=65001
UpdateRate=2
ForceReload=1
RegExp=(?siU)UPDATED=(.*)\nCOINS=(.*)\nSTREAK=(.*)\nMONTH_EARNED=(.*)\nMONTH_SUB=(.*)\nMONTH_GOAL=(.*)\nHAS_GOAL=(.*)\nGOAL_PCT=(.*)\nGOAL_INFO=(.*)\nTASKCOUNT=(.*)\nTASK1=(.*)\nTASK1_R=(.*)\nTASK1_C=(.*)\nTASK1_CAT=(.*)\nTASK1_TYPE=(.*)\nTASK2=(.*)\nTASK2_R=(.*)\nTASK2_C=(.*)\nTASK2_CAT=(.*)\nTASK2_TYPE=(.*)\nTASK3=(.*)\nTASK3_R=(.*)\nTASK3_C=(.*)\nTASK3_CAT=(.*)\nTASK3_TYPE=(.*)\nTASK4=(.*)\nTASK4_R=(.*)\nTASK4_C=(.*)\nTASK4_CAT=(.*)\nTASK4_TYPE=(.*)\nTASK5=(.*)\nTASK5_R=(.*)\nTASK5_C=(.*)\nTASK5_CAT=(.*)\nTASK5_TYPE=(.*)\nTASK6=(.*)\nTASK6_R=(.*)\nTASK6_C=(.*)\nTASK6_CAT=(.*)\nTASK6_TYPE=(.*)\nMORE=(.*)\n

[mCount]
Measure=WebParser
URL=[MeasureStats]
StringIndex=10

[mMore]
Measure=WebParser
URL=[MeasureStats]
StringIndex=41
IfMatch=^$
IfMatchAction=[!HideMeter more][!Redraw]
IfNotMatchAction=[!ShowMeter more][!Redraw]

[mHintCheck]
Measure=WebParser
URL=[MeasureStats]
StringIndex=1
IfMatch=^$
IfMatchAction=[!ShowMeter hint][!Redraw]
IfNotMatchAction=[!HideMeter hint][!Redraw]

[hdrPill]
Meter=Shape
Shape=Rectangle 20,14,160,32,16 | Fill Color 245,245,247,255 | StrokeWidth 0

[hdrText]
Meter=String
X=44
Y=22
FontFace=#FontName#
FontSize=12
FontColor=10,10,15
StringStyle=Bold
AntiAlias=1
DynamicVariables=1
Text=Wszystkie · [mCount]
