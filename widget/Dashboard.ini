; ===================== METERS =====================
[bg]
Meter=Shape
Shape=Rectangle 0,0,460,548,20 | Fill Color 14,14,20,235 | StrokeWidth 1 | Stroke Color 255,255,255,18

[title]
Meter=String
X=24
Y=22
FontFace=#FontName#
FontSize=19
FontColor=#cGold#
StringStyle=Bold
AntiAlias=1
Text=MOJE TO-DO

[updated]
Meter=String
X=436
Y=28
FontFace=#FontName#
FontSize=10
FontColor=#cDim#
StringAlign=Right
AntiAlias=1
DynamicVariables=1
Text=[mUpdated]

[goalLabel]
Meter=String
X=24
Y=62
FontFace=#FontName#
FontSize=10
FontColor=#cDim#
StringStyle=Bold
AntiAlias=1
Text=CEL MIESIACA

[goalValue]
Meter=String
X=24
Y=78
FontFace=#FontName#
FontSize=21
FontColor=#cMint#
StringStyle=Bold
AntiAlias=1
DynamicVariables=1
Text=[mEarned] / [mGoal]

[goalPct]
Meter=String
X=436
Y=86
FontFace=#FontName#
FontSize=15
FontColor=#cMint#
StringAlign=Right
StringStyle=Bold
AntiAlias=1
DynamicVariables=1
Text=[mGoalPct]%

[barBg]
Meter=Shape
Shape=Rectangle 24,120,412,16,8 | Fill Color 0,0,0,150 | StrokeWidth 0

[bar]
Meter=Bar
MeasureName=mGoalPctCalc
X=24
Y=120
W=412
H=16
BarColor=#cMint#
BarOrientation=Horizontal

[goalInfo]
Meter=String
X=24
Y=144
FontFace=#FontName#
FontSize=11
FontColor=#cDim#
AntiAlias=1
DynamicVariables=1
Text=[mGoalInfo]

[tasksHead]
Meter=String
X=24
Y=176
FontFace=#FontName#
FontSize=11
FontColor=#cDim#
StringStyle=Bold
AntiAlias=1
DynamicVariables=1
Text=DO ZROBIENIA ([mTaskCount])

[hint]
Meter=String
X=24
Y=206
W=412
H=300
Hidden=1
ClipString=2
FontFace=#FontName#
FontSize=12
FontColor=#cDim#
AntiAlias=1
Text=Brak danych z apki.#CRLF##CRLF#1) W apce: Ustawienia -> Widget na pulpit -> wybierz folder (np. C:\DashboardWidget).#CRLF##CRLF#2) W tym pliku (Dashboard.ini) ustaw StatsFile na pelna sciezke do dashboard-widget.txt#CRLF##CRLF#3) Kliknij prawym na widget -> Refresh.

