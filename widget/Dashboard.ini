; ============================================================
; Personal Dashboard — widget na pulpit (To-Do + Cel miesiaca)
; 1) Zainstaluj Rainmeter (https://www.rainmeter.net/)
; 2) Ustaw ponizej StatsFile na pelna sciezke do pliku
;    dashboard-widget.txt (folder wybrany w apce)
; 3) Zaladuj ten skin w Rainmeterze
; ============================================================

[Rainmeter]
Update=1000
DynamicWindowSize=1
AccurateText=1

[Metadata]
Name=Dashboard To-Do & Cel
Author=Personal Dashboard
Version=1.0

[Variables]
; --- ZMIEN TE SCIEZKE na swoj plik (najprosciej: utworz folder C:\DashboardWidget) ---
StatsFile=C:\DashboardWidget\dashboard-widget.txt
; kolory (R,G,B)
cCard=22,22,32
cText=245,245,247
cDim=154,154,168
cGold=255,184,0
cMint=0,245,160
FontName=Segoe UI

[MeasureStats]
Measure=WebParser
URL=file://#StatsFile#
CodePage=65001
UpdateRate=2
ForceReload=1
RegExp=(?siU)UPDATED=(.*)\nCOINS=(.*)\nSTREAK=(.*)\nMONTH_EARNED=(.*)\nMONTH_GOAL=(.*)\nHAS_GOAL=(.*)\nGOAL_PCT=(.*)\nGOAL_INFO=(.*)\nTASKCOUNT=(.*)\nTASK1=(.*)\nTASK1_R=(.*)\nTASK1_C=(.*)\nTASK2=(.*)\nTASK2_R=(.*)\nTASK2_C=(.*)\nTASK3=(.*)\nTASK3_R=(.*)\nTASK3_C=(.*)\nTASK4=(.*)\nTASK4_R=(.*)\nTASK4_C=(.*)\nTASK5=(.*)\nTASK5_R=(.*)\nTASK5_C=(.*)\nTASK6=(.*)\nTASK6_R=(.*)\nTASK6_C=(.*)\nTASK7=(.*)\nTASK7_R=(.*)\nTASK7_C=(.*)\nTASK8=(.*)\nTASK8_R=(.*)\nTASK8_C=(.*)\nMORE=(.*)\n

[mUpdated]
Measure=WebParser
URL=[MeasureStats]
StringIndex=1
[mCoins]
Measure=WebParser
URL=[MeasureStats]
StringIndex=2
[mStreak]
Measure=WebParser
URL=[MeasureStats]
StringIndex=3
[mEarned]
Measure=WebParser
URL=[MeasureStats]
StringIndex=4
RegExpSubstitute=1
IfMatch=^$
IfMatchAction=[!ShowMeter hint][!HideMeter goalValue][!HideMeter goalPct][!HideMeter goalInfo][!Redraw]
IfNotMatchAction=[!HideMeter hint][!ShowMeter goalValue][!ShowMeter goalPct][!ShowMeter goalInfo][!Redraw]
[mGoal]
Measure=WebParser
URL=[MeasureStats]
StringIndex=5
[mGoalPct]
Measure=WebParser
URL=[MeasureStats]
StringIndex=7
Substitute="":"0"
[mGoalInfo]
Measure=WebParser
URL=[MeasureStats]
StringIndex=8
[mTaskCount]
Measure=WebParser
URL=[MeasureStats]
StringIndex=9
[mGoalPctCalc]
Measure=Calc
Formula=[mGoalPct]
DynamicVariables=1
MinValue=0
MaxValue=100

[mT1]
Measure=WebParser
URL=[MeasureStats]
StringIndex=10
[mT1R]
Measure=WebParser
URL=[MeasureStats]
StringIndex=11
[mT1C]
Measure=WebParser
URL=[MeasureStats]
StringIndex=12
Substitute="":"22,22,32"
[mT2]
Measure=WebParser
URL=[MeasureStats]
StringIndex=13
[mT2R]
Measure=WebParser
URL=[MeasureStats]
StringIndex=14
[mT2C]
Measure=WebParser
URL=[MeasureStats]
StringIndex=15
Substitute="":"22,22,32"
[mT3]
Measure=WebParser
URL=[MeasureStats]
StringIndex=16
[mT3R]
Measure=WebParser
URL=[MeasureStats]
StringIndex=17
[mT3C]
Measure=WebParser
URL=[MeasureStats]
StringIndex=18
Substitute="":"22,22,32"
[mT4]
Measure=WebParser
URL=[MeasureStats]
StringIndex=19
[mT4R]
Measure=WebParser
URL=[MeasureStats]
StringIndex=20
[mT4C]
Measure=WebParser
URL=[MeasureStats]
StringIndex=21
Substitute="":"22,22,32"
[mT5]
Measure=WebParser
URL=[MeasureStats]
StringIndex=22
[mT5R]
Measure=WebParser
URL=[MeasureStats]
StringIndex=23
[mT5C]
Measure=WebParser
URL=[MeasureStats]
StringIndex=24
Substitute="":"22,22,32"
[mT6]
Measure=WebParser
URL=[MeasureStats]
StringIndex=25
[mT6R]
Measure=WebParser
URL=[MeasureStats]
StringIndex=26
[mT6C]
Measure=WebParser
URL=[MeasureStats]
StringIndex=27
Substitute="":"22,22,32"
[mT7]
Measure=WebParser
URL=[MeasureStats]
StringIndex=28
[mT7R]
Measure=WebParser
URL=[MeasureStats]
StringIndex=29
[mT7C]
Measure=WebParser
URL=[MeasureStats]
StringIndex=30
Substitute="":"22,22,32"
[mT8]
Measure=WebParser
URL=[MeasureStats]
