; CEL MIESIACA — Personal Dashboard (widget na pulpit)
; USTAW StatsFile ponizej na plik dashboard-widget.txt z folderu wybranego w apce.
; Najprosciej: utworz C:\DashboardWidget i wybierz go w apce -> dziala bez zmian.

[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Variables]
StatsFile=C:\DashboardWidget\dashboard-widget.txt
FontName=Segoe UI

[MeasureStats]
Measure=WebParser
URL=file://#StatsFile#
CodePage=65001
UpdateRate=2
ForceReload=1
RegExp=(?siU)UPDATED=(.*)\nCOINS=(.*)\nSTREAK=(.*)\nMONTH_EARNED=(.*)\nMONTH_SUB=(.*)\nMONTH_GOAL=(.*)\nHAS_GOAL=(.*)\nGOAL_PCT=(.*)\nGOAL_INFO=(.*)\nTASKCOUNT=(.*)\nTASK1=(.*)\nTASK1_R=(.*)\nTASK1_C=(.*)\nTASK1_CAT=(.*)\nTASK1_TYPE=(.*)\nTASK2=(.*)\nTASK2_R=(.*)\nTASK2_C=(.*)\nTASK2_CAT=(.*)\nTASK2_TYPE=(.*)\nTASK3=(.*)\nTASK3_R=(.*)\nTASK3_C=(.*)\nTASK3_CAT=(.*)\nTASK3_TYPE=(.*)\nTASK4=(.*)\nTASK4_R=(.*)\nTASK4_C=(.*)\nTASK4_CAT=(.*)\nTASK4_TYPE=(.*)\nTASK5=(.*)\nTASK5_R=(.*)\nTASK5_C=(.*)\nTASK5_CAT=(.*)\nTASK5_TYPE=(.*)\nTASK6=(.*)\nTASK6_R=(.*)\nTASK6_C=(.*)\nTASK6_CAT=(.*)\nTASK6_TYPE=(.*)\nMORE=(.*)\n

[mEarned]
Measure=WebParser
URL=[MeasureStats]
StringIndex=4
IfMatch=^$
IfMatchAction=[!ShowMeter hint][!HideMeterGroup data][!Redraw]
IfNotMatchAction=[!HideMeter hint][!ShowMeterGroup data][!Redraw]

[mSub]
Measure=WebParser
URL=[MeasureStats]
StringIndex=5

[mGoal]
Measure=WebParser
URL=[MeasureStats]
StringIndex=6

[mGoalPct]
Measure=WebParser
URL=[MeasureStats]
StringIndex=8
Substitute="":"0"

[mGoalInfo]
Measure=WebParser
URL=[MeasureStats]
StringIndex=9

[bg]
Meter=Shape
Shape=Rectangle 0,0,430,206,20 | Fill Color 9,20,16,242 | StrokeWidth 1 | Stroke Color 0,245,160,45
Shape2=Ellipse 380,-10,140,140 | Fill Color 0,245,160,26 | StrokeWidth 0

[lblMonth]
Meter=String
Group=data
X=26
Y=22
FontFace=#FontName#
FontSize=11
FontColor=150,150,165
StringStyle=Bold
AntiAlias=1
Text=TEN MIESIAC

[bigVal]
Meter=String
Group=data
X=24
Y=36
FontFace=#FontName#
FontSize=42
FontColor=0,245,160
StringStyle=Bold
AntiAlias=1
DynamicVariables=1
Text=[mEarned]

[sub]
Meter=String
Group=data
X=26
Y=98
FontFace=#FontName#
FontSize=12
FontColor=150,150,165
AntiAlias=1
DynamicVariables=1
Text=[mSub]

[lblGoal]
Meter=String
Group=data
X=26
Y=130
FontFace=#FontName#
FontSize=10
FontColor=150,150,165
StringStyle=Bold
AntiAlias=1
Text=CEL MIESIACA

[goalVal]
Meter=String
Group=data
X=404
Y=128
StringAlign=Right
FontFace=#FontName#
FontSize=13
FontColor=245,245,247
StringStyle=Bold
AntiAlias=1
DynamicVariables=1
Text=[mEarned] / [mGoal]

[barBg]
Meter=Shape
Group=data
Shape=Rectangle 26,154,378,10,5 | Fill Color 0,0,0,120 | StrokeWidth 0

[barFill]
Meter=Shape
Group=data
DynamicVariables=1
Shape=Rectangle 26,154,(Clamp([mGoalPct],0,100)*3.78+0.01),10,5 | Fill Color 0,245,160,255 | StrokeWidth 0

[pct]
Meter=String
Group=data
X=26
Y=172
FontFace=#FontName#
FontSize=11
FontColor=0,245,160
StringStyle=Bold
AntiAlias=1
DynamicVariables=1
Text=[mGoalPct]%

[info]
Meter=String
Group=data
X=404
Y=172
StringAlign=Right
FontFace=#FontName#
FontSize=11
FontColor=150,150,165
AntiAlias=1
DynamicVariables=1
Text=[mGoalInfo]

[hint]
Meter=String
X=26
Y=60
W=380
H=110
Hidden=1
ClipString=2
FontFace=#FontName#
FontSize=12
FontColor=150,150,165
AntiAlias=1
Text=Brak danych z apki.#CRLF##CRLF#W apce: Ustawienia -> Widget na pulpit -> wybierz folder, potem ustaw StatsFile w tym pliku i zrob Refresh.